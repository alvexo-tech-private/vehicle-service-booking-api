databaseChangeLog:
  - changeSet:
      id: 010-create-payments-table
      author: system
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: booking_id
                  type: BIGINT
              - column:
                  name: subscription_id
                  type: BIGINT
              - column:
                  name: payment_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(10)
                  defaultValue: USD
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(50)
              - column:
                  name: stripe_payment_intent_id
                  type: VARCHAR(255)
              - column:
                  name: stripe_charge_id
                  type: VARCHAR(255)
              - column:
                  name: transaction_id
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: payment_date
                  type: TIMESTAMP
              - column:
                  name: failure_reason
                  type: TEXT
              - column:
                  name: metadata
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: user_id
            constraintName: fk_payments_user
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: booking_id
            constraintName: fk_payments_booking
            referencedTableName: bookings
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: subscription_id
            constraintName: fk_payments_subscription
            referencedTableName: user_subscriptions
            referencedColumnNames: id
        - createIndex:
            indexName: idx_payments_user
            tableName: payments
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_payments_booking
            tableName: payments
            columns:
              - column:
                  name: booking_id
        - createIndex:
            indexName: idx_payments_status
            tableName: payments
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_payments_transaction
            tableName: payments
            columns:
              - column:
                  name: transaction_id
