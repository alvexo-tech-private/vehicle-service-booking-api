databaseChangeLog:
  - changeSet:
      id: 004-create-user-vehicles-table
      author: system
      changes:
        - createTable:
            tableName: user_vehicles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: ownership_type
                  type: VARCHAR(50)
              - column:
                  name: purchase_date
                  type: DATE
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_vehicles
            baseColumnNames: user_id
            constraintName: fk_user_vehicles_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_vehicles
            baseColumnNames: vehicle_id
            constraintName: fk_user_vehicles_vehicle
            referencedTableName: vehicles
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: user_vehicles
            columnNames: user_id, vehicle_id
            constraintName: uk_user_vehicle
        - createIndex:
            indexName: idx_user_vehicles_user
            tableName: user_vehicles
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_user_vehicles_vehicle
            tableName: user_vehicles
            columns:
              - column:
                  name: vehicle_id
