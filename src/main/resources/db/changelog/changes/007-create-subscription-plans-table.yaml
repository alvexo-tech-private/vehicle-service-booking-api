databaseChangeLog:
  - changeSet:
      id: 007-create-subscription-plans-table
      author: system
      changes:
        - createTable:
            tableName: subscription_plans
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: plan_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: duration_days
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(10)
                  defaultValue: USD
                  constraints:
                    nullable: false
              - column:
                  name: max_bookings
                  type: INT
              - column:
                  name: max_vehicles
                  type: INT
              - column:
                  name: features
                  type: TEXT
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: stripe_price_id
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_subscription_plans_user_role
            tableName: subscription_plans
            columns:
              - column:
                  name: user_role
        - createIndex:
            indexName: idx_subscription_plans_active
            tableName: subscription_plans
            columns:
              - column:
                  name: active
