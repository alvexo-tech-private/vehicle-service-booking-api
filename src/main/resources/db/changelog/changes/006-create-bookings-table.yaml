databaseChangeLog:
  - changeSet:
      id: 006-create-bookings-table
      author: system
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicle_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: mechanic_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: vehicle_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: booking_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: scheduled_date_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: service_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: estimated_cost
                  type: DECIMAL(10,2)
              - column:
                  name: actual_cost
                  type: DECIMAL(10,2)
              - column:
                  name: estimated_duration_minutes
                  type: INT
              - column:
                  name: actual_duration_minutes
                  type: INT
              - column:
                  name: mechanic_notes
                  type: TEXT
              - column:
                  name: customer_notes
                  type: TEXT
              - column:
                  name: cancellation_reason
                  type: TEXT
              - column:
                  name: cancelled_by
                  type: BIGINT
              - column:
                  name: completed_at
                  type: TIMESTAMP
              - column:
                  name: cancelled_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: vehicle_user_id
            constraintName: fk_bookings_vehicle_user
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: mechanic_id
            constraintName: fk_bookings_mechanic
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: vehicle_id
            constraintName: fk_bookings_vehicle
            referencedTableName: vehicles
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: bookings
            baseColumnNames: cancelled_by
            constraintName: fk_bookings_cancelled_by
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: idx_bookings_vehicle_user
            tableName: bookings
            columns:
              - column:
                  name: vehicle_user_id
        - createIndex:
            indexName: idx_bookings_mechanic
            tableName: bookings
            columns:
              - column:
                  name: mechanic_id
        - createIndex:
            indexName: idx_bookings_status
            tableName: bookings
            columns:
              - column:
                  name: status
        - createIndex:
            indexName: idx_bookings_scheduled_date
            tableName: bookings
            columns:
              - column:
                  name: scheduled_date_time
        - createIndex:
            indexName: idx_bookings_number
            tableName: bookings
            columns:
              - column:
                  name: booking_number
