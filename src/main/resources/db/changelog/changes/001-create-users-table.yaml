databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: system
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: mobile_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: email_verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: mobile_verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: profile_image_url
                  type: VARCHAR(500)
              - column:
                  name: address_line1
                  type: VARCHAR(255)
              - column:
                  name: address_line2
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: state
                  type: VARCHAR(100)
              - column:
                  name: postal_code
                  type: VARCHAR(20)
              - column:
                  name: country
                  type: VARCHAR(100)
              - column:
                  name: latitude
                  type: DECIMAL(10,8)
              - column:
                  name: longitude
                  type: DECIMAL(11,8)
              # Mechanic-specific fields
              - column:
                  name: specialization
                  type: VARCHAR(255)
              - column:
                  name: experience_years
                  type: INT
              - column:
                  name: hourly_rate
                  type: DECIMAL(10,2)
              - column:
                  name: bio
                  type: TEXT
              - column:
                  name: rating
                  type: DECIMAL(3,2)
              - column:
                  name: total_reviews
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: total_bookings_completed
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: certification_details
                  type: TEXT
              # Sales Representative fields
              - column:
                  name: referral_code
                  type: VARCHAR(50)
                  constraints:
                    unique: true
              - column:
                  name: total_referrals
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: total_bonus_earned
                  type: DECIMAL(10,2)
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_users_email
            tableName: users
            columns:
              - column:
                  name: email
        - createIndex:
            indexName: idx_users_mobile
            tableName: users
            columns:
              - column:
                  name: mobile_number
        - createIndex:
            indexName: idx_users_role
            tableName: users
            columns:
              - column:
                  name: role
        - createIndex:
            indexName: idx_users_referral_code
            tableName: users
            columns:
              - column:
                  name: referral_code
        - createIndex:
            indexName: idx_users_location
            tableName: users
            columns:
              - column:
                  name: latitude
              - column:
                  name: longitude
