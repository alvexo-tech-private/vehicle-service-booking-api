databaseChangeLog:
  - changeSet:
      id: 009-create-referrals-table
      author: system
      changes:
        - createTable:
            tableName: referrals
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sales_rep_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: referred_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: referral_code_used
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: bonus_amount
                  type: DECIMAL(10,2)
              - column:
                  name: bonus_paid
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: bonus_paid_at
                  type: TIMESTAMP
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: referrals
            baseColumnNames: sales_rep_id
            constraintName: fk_referrals_sales_rep
            referencedTableName: users
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: referrals
            baseColumnNames: referred_user_id
            constraintName: fk_referrals_referred_user
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: idx_referrals_sales_rep
            tableName: referrals
            columns:
              - column:
                  name: sales_rep_id
        - createIndex:
            indexName: idx_referrals_referred_user
            tableName: referrals
            columns:
              - column:
                  name: referred_user_id
        - createIndex:
            indexName: idx_referrals_status
            tableName: referrals
            columns:
              - column:
                  name: status
