databaseChangeLog:
  - changeSet:
      id: 003-create-vehicles-table
      author: system
      changes:
        - createTable:
            tableName: vehicles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: make
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: year
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: vin
                  type: VARCHAR(50)
                  constraints:
                    unique: true
              - column:
                  name: license_plate
                  type: VARCHAR(50)
              - column:
                  name: vehicle_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(50)
              - column:
                  name: mileage
                  type: INT
              - column:
                  name: engine_type
                  type: VARCHAR(50)
              - column:
                  name: transmission_type
                  type: VARCHAR(50)
              - column:
                  name: fuel_type
                  type: VARCHAR(50)
              - column:
                  name: image_url
                  type: VARCHAR(500)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: vehicles
            baseColumnNames: created_by
            constraintName: fk_vehicles_created_by
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            indexName: idx_vehicles_vin
            tableName: vehicles
            columns:
              - column:
                  name: vin
        - createIndex:
            indexName: idx_vehicles_created_by
            tableName: vehicles
            columns:
              - column:
                  name: created_by
