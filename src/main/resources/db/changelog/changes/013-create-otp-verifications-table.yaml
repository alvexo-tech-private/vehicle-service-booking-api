databaseChangeLog:
  - changeSet:
      id: 013-create-otp-verifications-table
      author: bike-service-team
      changes:
        - createTable:
            tableName: otp_verifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: mobile_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: otp
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: expiry_time
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        # Index for faster lookups by mobile number
        - createIndex:
            indexName: idx_otp_mobile_number
            tableName: otp_verifications
            columns:
              - column:
                  name: mobile_number
        # Index for finding non-verified OTPs
        - createIndex:
            indexName: idx_otp_verified
            tableName: otp_verifications
            columns:
              - column:
                  name: verified
