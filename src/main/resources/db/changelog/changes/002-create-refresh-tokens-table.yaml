databaseChangeLog:
  - changeSet:
      id: 002-create-refresh-tokens-table
      author: system
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: device_id
                  type: VARCHAR(255)
              - column:
                  name: device_type
                  type: VARCHAR(50)
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            constraintName: fk_refresh_tokens_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_refresh_tokens_token
            tableName: refresh_tokens
            columns:
              - column:
                  name: token
        - createIndex:
            indexName: idx_refresh_tokens_user
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_id
